services:
  home-dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      # IMPORTANT: If accessing from another device, change localhost to your host's IP (e.g., http://192.168.1.100:8055)
      - DIRECTUS_URL=http://localhost:8055
      - DIRECTUS_INTERNAL_URL=http://directus:8055
    depends_on:
      directus:
        condition: service_healthy
    restart: always

  directus:
    image: directus/directus:11.17.1
    ports:
      - "8055:8055"
    volumes:
      - directus-database:/directus/database
      - directus-uploads:/directus/uploads
    environment:
      - KEY=04b20cc8-0bf4-45e0-8bde-6f5b9d33a1e2
      - SECRET=91cd10c5-e51c-4bba-bd44-24e548d88eef
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin
      - DB_CLIENT=sqlite3
      - DB_FILENAME=/directus/database/data.db
      - WEBSOCKETS_ENABLED=true
      - CORS_ENABLED=true
      - CORS_ORIGIN=true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8055/server/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  directus-database:
  directus-uploads:
